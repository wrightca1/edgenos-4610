# addrs.conf — persistent L3 addresses for AS4610 front-panel ports.
# Applied at boot by edgenos-l3.service (after bcmd creates the ge*/xe* netdevs).
# bcmd programs the L3 local-host CPU-punt automatically via its live RTM_NEWADDR
# netlink handler, so no bcmd restart is needed.
#
# Format (one per line):  <iface> <addr/prefixlen> [mtu]
#   iface  = SDK port netdev name (copper geN, SFP+ xeN) — see PORTMAP.md
#   mtu    = optional; the far-side network runs MTU 1600 (OSPF DBD MTU must match
#            or the peer stays stuck in ExStart). KNET is loaded default_mtu=1600
#            so 1600 is the netdev default already; listed here for clarity.
# Lines starting with # and blank lines are ignored.

ge25  10.14.1.2/24      1600     # copper front port 1  -> 10.14.1.0/24 (router .254)
xe0   10.101.102.2/29   1600     # SFP+ port 49         -> 10.101.102.0/29 (peer .1)
