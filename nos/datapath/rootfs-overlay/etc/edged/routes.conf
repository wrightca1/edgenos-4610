# routes.conf — persistent STATIC transit routes for AS4610, applied at boot by
# edgenos-l3.service after the addresses are set. bcmd mirrors each into the chip
# L3 tables (RTM_NEWROUTE -> bcm_l3_route_add); the delete path withdraws them.
#
# Format (one route per line):
#   <dst/prefixlen>   <gw>:<dev>
# Lines starting with # and blank lines are ignored.
#
# Normally EMPTY: real downstream networks are learned dynamically via OSPF
# (Quagga ospfd, see /etc/quagga/ospfd.conf) and programmed into the chip by the
# same netlink sync. Add a line here only for a STATIC route, e.g.:
#   192.0.2.0/24  10.101.102.1:xe0
# Do NOT add a default route via a front port unless intended (would override mgmt).
