# edged IPv4 L3 demo — route between two subnets on the SFP+ uplinks (xe0/xe1).
# Two routed interfaces, each its own VLAN + router MAC:
intf 11 53 00:11:22:00:00:0b
intf 12 54 00:11:22:00:00:0c

# Directly-connected neighbors (installs /32 host routes + next hops):
nbr 10.0.11.2 00:aa:bb:cc:dd:0b 11
nbr 10.0.12.2 00:aa:bb:cc:dd:0c 12

# An LPM route reachable via the vlan-12 neighbor:
route 192.168.50.0/24 10.0.12.2
